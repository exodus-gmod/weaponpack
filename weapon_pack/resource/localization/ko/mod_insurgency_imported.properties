insurgency_game_description_ambush=호위 진영은 VIP를 보호해야하며, 성공적으로 그를 이탈 지점에 도달시켜야합니다.  매복 진영은 VIP의 위치를 확보 및 사살해야합니다, 식별은 그의 특정한 옷차림으로 가능합니다.
insurgency_game_description_battle=양 진영은 전장을 가로지르는 거점들을 제공받습니다. 한 진영이 모든 거점을 점령하면 게임이 끝납니다.
insurgency_game_description_checkpoint=반란군이 점거한 구역을 관통하며 순차적으로 소탕, 거점을 확보하고, 유사 시의 반격을 대비하고 방어하십시오. 특정 목표 거점에는 반드시 파괴해야할 반란군의 무기 은닉함이 위치해있다는 사전 정보가 있으니 분대원 한 명 이상이 폭발물을 소지할 수 있도록 하십시오!
insurgency_game_description_conquer=반란군이 점거한 구역을 관통하며 순차적으로 소탕, 거점을 확보하십시오. 적의 무기 은닉함을 파괴하여 세력을 약화시킬 수 있습니다.
insurgency_game_description_elimination=이 수색 및 파괴 작전에서, 공격 진영은 방어 진영이 가진 두 무기 은닉함 중 하나를 반드시 파괴해야합니다.
insurgency_game_description_firefight=전장에는 총 세 개의 거점이 존재합니다. 이 세 거점을 모두 점거하거나, 또는 적을 섬멸하면 승리하게 됩니다. 목표 거점이 확보될 때 마다 증원됩니다.
insurgency_game_description_flashpoint=중앙의 목표를 점거하거나 적의 무기 은닉함을 파괴함으로써 증원을 받을 수 있습니다. 모든 구역을 점령하거나 적을 섬멸하면 승리할 수 있습니다.
insurgency_game_description_hunt=작전 구역 내의 모든 반란군을 섬멸하고, 제공된 세 개의 유력 지점 중, 어딘가에 있을 하나의 무기 은닉함을 파괴하십시오.
insurgency_game_description_infiltrate=적의 정보를 탈취하고 아군의 진영을 잠입으로부터 방어해야합니다. 아군은 적의 정보를 탈취하거나 아군의 정보를 탈취한 적을 사살할 경우 증원됩니다. 적의 정보를 아군 기지까지 탈취해내 승리하십시오.
insurgency_game_description_invasion=침공 진영은 순차적으로 한 거점씩을 공격 및 확보하며 방어 진영을 밀어내야 합니다. 방어 진영은 무슨 수를 써서라도 공격 진영의 진격을 저지해야 합니다. 침공 진영은 방어 진영에 비해 매우 적은 증원 기회와 시간을 갖고 시작하게 되지만, 방어 진영의 거점을 확보할 때 마다 추가적인 증원 기회와 작전 시간 연장을 받을 수 있습니다.
insurgency_game_description_occupy=중앙의 목표를 점거하면 지속적인 증원을 받을 수 있습니다. 적의 증원을 단절시키거나 구역 내의 적을 모두 사살하면 승리할 수 있습니다.
insurgency_game_description_outpost=아군의 전초, 그리고 전초 내의 무기 은닉함을 보호하십시오. 반란군의 공격이 끝나는 즉시 증원됩니다.
insurgency_game_description_push=모드 단계였던 인서전시 시절부터 이어져온 작전 종류로써, 공격 진영은 순차적으로 한 거점씩을 공격 및 확보하며 방어 진영을 밀어내야 합니다. 방어 진영은 무슨 수를 써서라도 공격 진영의 진격을 저지해야 합니다.공격 진영은 매우 적은 증원 기회와 시간을 갖고 시작하게 되지만, 방어 진영의 거점을 확보할 때 마다 5 번의 증원 기회와 5분의 작전 시간 연장을 받을 수 있습니다
insurgency_game_description_searchdestroy=공격 진영은 적의 두 무기 은닉함을 파괴해야합니다. 공격 진영에게는 본부로부터 적의 무기 은닉함이 위치한 세 개의 유력 지점이 임의로 제공되며, 적의 두 무기 은닉함이 세 개의 지점 중, 어느 곳에 위치해있는지 수색 및 탐사 후, 파괴해야합니다.방어 진영은 아군의 무기 은닉함이 적에게 모두 파괴되지 않도록 방어해야합니다.플레이어는 오직 무기 은닉함이 파괴된 순간에 증원이 가능하며, 적을 모두 섬멸하면 확실한 승리를 거둘 수 있습니다.
insurgency_game_description_short_ambush=매복한 적으로부터 VIP가 성공적으로 이탈 지점까지 도달할 수 있도록 호위하십시오.
insurgency_game_description_short_battle=양 진영은 전장을 가로지르게 되며, 모든 거점을 확보하면 승리합니다.
insurgency_game_description_short_checkpoint=구역을 관통하며 반란군을 소탕하고, 거점 확보 후, 반격에 대비하십시오.
insurgency_game_description_short_conquer=구역을 관통하며 반란군을 소탕하고 반란군의 무기 은닉함을 파괴하십시오.
insurgency_game_description_short_elimination=공격 진영은 방어 진영의 두 무기 은닉함 중 하나를 파괴하고, 방어 진영은 그것을 막으십시오.
insurgency_game_description_short_firefight=모든 거점을 확보하거나 적을 섬멸하십니오, 목표 거점이 확보될 때 마다 아군이 증원됩니다.
insurgency_game_description_short_flashpoint=거점을 확보하고 적의 무기 은닉함을 파괴해야하며, 아군의 거점과 무기 은닉함을 방어해야합니다.
insurgency_game_description_short_hunt=구역의 반란군을 섬멸하고, 3개의 유력 지점 중, 어딘가에 있을 반란군의 무기 은닉함을 파괴하십시오.
insurgency_game_description_short_infiltrate=적의 고가치 정보를 탈취하고, 반대로 적이 아군의 기지에 침투하지 못하도록 막으십시오.
insurgency_game_description_short_invasion=거점을 확보해 적들을 밀어내십시오. 방어 진영은 반드시 적의 침공을 막아내야합니다.
insurgency_game_description_short_occupy=거점 점령으로 구역의 통제권을 확보하여 적의 증원을 소모시키십시오.
insurgency_game_description_short_outpost=가능한 한 오랫동안, 끝없는 반란군의 공세를 막아내십시오.
insurgency_game_description_short_push=공격 진영은 거점을 확보하며 적을 밀어내야합니다. 방어 진영은 진격을 막아야 합니다.
insurgency_game_description_short_searchdestroy=방어 진영을 섬멸하거나 무기 은닉함을 찾아 파괴하십시오.
insurgency_game_description_short_skirmish=모든 거점을 확보, 적의 모든 무기 은닉함을 파괴하거나, 단순히 적을 섬멸하십시오.
insurgency_game_description_short_strike=적의 무기 은닉함을 파괴하거나 적이 아군의 무기 은닉함을 파괴하지 못하도록 방어하십시오.
insurgency_game_description_short_survival=적의 강점에 맞서 싸워 가능한 한 오래동안 생존하십시오.
insurgency_game_description_short_vendetta=모든 거점을 점령하거나 구역의 모든 적을 섬멸하십시오.
insurgency_game_description_skirmish=목표 구역의 통제권을 확보하고 적의 무기 은닉함을 파괴하십시오, 또는 단순히 적을 모두 섬멸하십시오. 적에게서 목표 거점을 점령해내거나 무기 은닉함을 파괴하면 아군이 증원되며 증원 기회가 늘어납니다. 무기 은닉함을 잘 보호하고 있는 지 유념하십시오, 무기 은닉함이 파괴되면 탈취된 목표물을 확보해도 증원 기회가 늘지 않습니다.
insurgency_game_description_strike=이 수색 및 파괴 작전에서, 공격 진영은 방어 진영의 무기 은닉함을 모두 찾아 파괴해야합니다.
insurgency_game_description_survival=활성화된 안가를 확보해 재보급을 받고 아군을 증강시키십시오.활성화된 어떤 안가에서든지 시간에 제약받지 않고 재보급을 할 수 있습니다.적의 강점에 맞서 싸워 생존하십시오!
insurgency_game_description_training=입대를 환영합니다. 당신은 상급 훈련 과정을 거치기 위해 이라크의 외딴 군 시설로 파견되었습니다. 훈련 담당관의 지시에 잘 따르셔서 좋은 병사가 되길 기원하겠습니다!
insurgency_game_description_vendetta=목표 거점을 점령하거나, 적을 섬멸하면 승리할 수 있습니다.
