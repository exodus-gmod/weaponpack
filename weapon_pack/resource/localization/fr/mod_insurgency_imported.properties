insurgency_game_description_ambush=L\'équipe d\'escorte à pour objectif de protéger leur VIP et l\'amener au point d\'extraction.L\'équipe en embuscade doit localiser et éliminer le VIP, qui peut etre identifié par son habillement distinct.
insurgency_game_description_battle=Chaque équipes ont l\'objectif de pousser à travers la carte. Une équipe gagne lorsque tous les objectifs ont été capturés.
insurgency_game_description_checkpoint=Dans ce mode de jeu coopératif, vous remplirez des missions en équipe avec vos amis contre des adversaires gérés par l\'IA du jeu.Progressez en territoire ennemi en ciblant vos objectifs l\'un après l\'autre, nettoyant chaque zone et les défendant contre d\'éventuelles contre-attaques ennemies.Certains objectifs sont des stocks d\'armes des insurgés qu\'il faut détruire, assurez vous donc qu\'au moins un des membres de votre équipe a des explosifs !
insurgency_game_description_conquer=Déplacez-vous à travers le territoire occupé par l\'ennemi et sécurisez la zone. Détruisez les caches d\'armes ennemis pour les affaiblir.
insurgency_game_description_elimination=Dans ce mode de jeu recherche et destruction, les attaquants doivent détruire une des deux caches d\'armes des défenseurs.
insurgency_game_description_firefight=Pour gagner, votre équipe doit capturer tous les territoires ou éliminer l\'équipe adverse. Votre équipe sera renforcé si un objectif est capturé.
insurgency_game_description_flashpoint=Capturez l\'objectif du milieu ou détruisez un cache ennemi pour recevoir des renforts. Gagnez le contrôle de toute la zone ou éliminez l\'équipe ennemie pour gagner.
insurgency_game_description_hunt=Localisez et éliminez tout les caches d\'armes hostiles dans la zone.
insurgency_game_description_infiltrate=Obtenez les documents de l\'ennemi et gardez votre propre base sécuriser de l\'infiltration. Votre équipe gagnera une vague renforts lorsque les documents de l\'ennemi seront volés ou que l\'un des voleurs de documents ennemi sera tué. Sécurisez les documents de l\'ennemi en le ramenant dans votre base pour achever la victoire.
insurgency_game_description_invasion=Les envahisseurs doivent capturer un point à la fois afin de progresser tout en faisant reculer l\'ennemi.Les défenseurs doivent stopper la progression des attaquants.Les attaquants démarrent avec moins de vagues de renforts que les défenseurs, mais à chaque fois qu\'ils capturent un point ils gagnent des vagues de renforts  et du temps supplémentaires.
insurgency_game_description_occupy=Contrôlez l\'objectif du milieu pour recevoir flux de renforts. Coupez les renforts ennemi et éliminez leur présence dans la zone pour gagner.
insurgency_game_description_outpost=Protégez votre avant-poste ainsi que le cache se trouvant à l\'intérieur. Votre équipe sera renforcé à chaque fin d\'attaque ennemie.
insurgency_game_description_push=Dans ce mode de jeu classique, les attaquants doivent capturer un point à la fois pour avancer tout en faisant reculer la ligne ennemie.Les défenseurs doivent stopper l\'avancée ennemie.Les attaquants commencent avec beaucoup moins de vagues et peu de temps, mais à chaque fois qu\'ils capturent un objectif, ils gagnent 5 vagues et 5 minutes supplémentaires.
insurgency_game_description_searchdestroy=En tant qu\'attaquants, vous devez détruire les deux caches d\'armes ennemies. Les renseignements du QG indiquent 3 emplacements possibles, donc l\'équipe attaquante doit chercher et découvrir l\'emplacement des deux caches.En tant que défenseur,  vous devez empêcher l\'équipe ennemie de détruire vos deux caches d\'armes.Les joueurs tués ne réapparaissant que lorsqu\'une des caches est détruite, tuer toute l\'équipe ennemie est donc synonyme de victoire.
insurgency_game_description_short_ambush=Protégez le VIP des ennemis en embuscade tout en l\'escortant au point d\'extraction.
insurgency_game_description_short_battle=Les deux équipes doivent effectuer une percée à travers la carte et capturer tous les objectifs pour gagner.
insurgency_game_description_short_checkpoint=Déplacez vous à travers le territoire ennemi, sécurisez les zones et tenez face aux contres-attaques ennemies.
insurgency_game_description_short_conquer=Déplacez vous à travers le territoire ennemis, détruisez les caches d\'armes et nettoyez la zone.
insurgency_game_description_short_elimination=Une équipe doit défendre ses caches d\'armes pendant que l\'autre équipe doit détruire au moins l\'une d\'entre elles.
insurgency_game_description_short_firefight=Capturez les objectifs ou éliminez l\'équipe ennemie, obtenez des vagues de renfort en capturant les objectifs.
insurgency_game_description_short_flashpoint=Prenez le contrôle des objectifs et détruisez les caches ennemies tout en défendant les vôtres.
insurgency_game_description_short_hunt=Localisez la cache ennemie et éliminez tous les insurgés dans la zone.
insurgency_game_description_short_infiltrate=Mode Capture de drapeau, saisissez les données ennemies tout en protégeant les vôtres.
insurgency_game_description_short_invasion=Capturez les points de contrôle et repoussez les ennemies. Les défenseurs doivent arrêter l\'invasion.
insurgency_game_description_short_occupy=Le mode de jeu \"Roi de la colline\" a pour but de contrôler la zone afin de réduire les renforts ennemies.
insurgency_game_description_short_outpost=Tenez votre position aussi longtemps que possible.
insurgency_game_description_short_push=Capturez des points de contrôle et repoussez les ennemis. Les défenseurs doivent arrêter l\'avancée des attaquants.
insurgency_game_description_short_searchdestroy=Localisez et détruisez les caches d\'armes ennemies tout en éliminant tous les défenseurs.
insurgency_game_description_short_skirmish=Contrôlez tous les territoires ennemis et détruisez la cache adverse, ou éliminez toute l\'équipe adverse.
insurgency_game_description_short_strike=Une équipe doit défendre ses caches d\'armes pendant que l\'autre équipe doit les détruire.
insurgency_game_description_short_survival=Combattez l\'occupation ennemie et survivez aussi longtemps que possible dans ce mode coopératif.
insurgency_game_description_short_vendetta=Sécurisez le point de contrôle ou éliminez les ennemis dans la zone.
insurgency_game_description_skirmish= Contrôlez tous les territoires et détruisez les caches ennemis, ou éliminez simplement toute l\'équipe adverse.Chaque objectif pris à l\'ennemi fera réapparaître automatiquement toute votre équipe, la récompensant d\'une vague de renforts.Assurez-vous de protéger votre cache, car une fois détruit votre équipe ne pourra plus gagner de vagues de renfort grâce à la capture.
insurgency_game_description_strike=Dans ce mode de jeu de recherche et de destruction, l\'équipe attaquante doit détruire tout les caches d\'armes de l\'équipe défendante.
insurgency_game_description_survival=Sécurisez les planques actives pour gagner des ravitaillements et renforcer votre équipe.Vous pouvez vous ravitailler à n\'importe quelle planque à tout moment.Survivez et combattez l\'occupation ennemie !
insurgency_game_description_training=Bienvenue sur Insurgency.Nous vous envoyons dans une région éloignée en Irak pour une formation avancée. Assurez-vous de suivre les consignes de votre instructeur et vous devriez être en bonne forme!
insurgency_game_description_vendetta=Contrôlez tous les points de contrôles ou éliminez l\'équipe ennemie pour gagner.
