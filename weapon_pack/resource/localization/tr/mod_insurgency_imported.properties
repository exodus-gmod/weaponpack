insurgency_game_description_ambush=Korumalar VIP\'yi güvenli bölgeye ulaştırmalıdır.Pusu takımının görevi VIP\'yi öldürmek. (VIP, korumalardan farklı bir giyime sahip.)
insurgency_game_description_battle=Tüm hedefleri ele geçiren takım kazanır.
insurgency_game_description_checkpoint=Bu görev tabanlı Co-Op modunda arkadaşlarınızla birlikte botlara karşı oynayacaksınız.Düşman bölgesine ilerleyin, bölgeleri temizleyin ve düşman saldırılarını geri püskürtün.Bazı hedeflerin patlatılması gerekebilir, takımınızdan bir kişinin patlayıcı taşıdığına emin olun!
insurgency_game_description_conquer=Düşman bölgesine ilerle ve kontrol altına al. Düşmanı zayıflatmak için cephaneliğini yok et.
insurgency_game_description_elimination=Bu Search and Destroy modunda saldıran takım düşman cephaneliklerinden bir tanesini yok etmelidir.
insurgency_game_description_firefight=Kazanmak için takımın bölgesel görevleri yerine getirmelidir ya da düşman etkisiz hale getirilmelidir. Görevler yerine getirildiği zaman takviye kuvvetler gelecektir.
insurgency_game_description_flashpoint=Takviye kuvvetlerin gelmesi için görevleri gerçekleştirin ya da düşman cephaneliğini yok edin. Kazanmak için bölgeyi kontrol altına alın ya da düşmanı etkisiz hale getirin.
insurgency_game_description_hunt=Bölgedeki düşmanları ve cephaneliklerini bulup yok edin.
insurgency_game_description_infiltrate=Düşman istihbaratını ele geçir ve üssünü koru. Düşman istihbaratını aldığınızda ya da istihbaratınızı taşıyan düşmanı öldürdüğünüzde takımın ek dalga kazanır.
insurgency_game_description_invasion=Saldıran taraf ilerlemek için bir noktayı ele geçirmelidir.Savunan taraf karşı takımı geri püskürtmelidir.Başlangıçta saldıran tarafın dalga sayısı daha azdır ancak kontrol noktalarını ele geçirdikçe ek dalga ve süre kazanırlar.
insurgency_game_description_occupy=Takviye kuvvetlerin gelmesi için görevleri gerçekleştirin. Kazanmak için düşmanın takviye kuvveti kazanmasını engelleyin ve kalan düşmanı etkisiz hale getirin.
insurgency_game_description_outpost=Bölgenizi ve cephaneliğinizi koruyun. Her düşman saldırısından sonra takımınıza yeni bir takviye kuvvet gelecek.
insurgency_game_description_push=Saldıran taraf kontrol noktalarını ele geçirerek düşmanı geri çekilmeye zorlamalıdır.Savunan taraf kontrol noktasını korumalı ve düşmanı geri püskürtmelidir.Başlangıçta saldıran tarafın dalga sayısı daha azdır ancak kontrol noktalarını ele geçirdikçe ek olarak 5 dalga ve 5 dakika kazanırlar
insurgency_game_description_searchdestroy=Saldıran taraf düşmanın cephaneliklerini patlatmalıdır. Ara, bul ve yok et! Savunan taraf cephaneliklerini düşmandan korumalıdır.Ölen oyuncular cephanelikler patlatıldığı zaman yeniden doğarlar. Karşı tarafın tüm oyuncuları ölürse oyun biter.
insurgency_game_description_short_ambush=VIP\'ye eşlik et ve koru.
insurgency_game_description_short_battle=Kazanmak için bütün hedefleri ele geçirin.
insurgency_game_description_short_checkpoint=Düşman bölgesine ilerle, bölgeyi düşmandan temizle ve saldırıları püskürt.
insurgency_game_description_short_conquer=Düşman bölgesine ilerle, cephanelikleri yok et ve bölgeyi düşmandan temizle.
insurgency_game_description_short_elimination=Bir takım cephaneliği korurken diğer takım cephaneliklerden bir tanesini yok etmeye çalışacak.
insurgency_game_description_short_firefight=Hedefleri ele geçir ya da düşmanı etkisiz hale getir. Bir hedef ele geçirildiği zaman destek kuvvetler gelir.
insurgency_game_description_short_flashpoint=Cephaneliğini koru, hedefleri ele geçir ve düşman cephaneliğini yok et.
insurgency_game_description_short_hunt=Düşman cephaneliğini bul ve tüm isyancıları etkisiz hale getir.
insurgency_game_description_short_infiltrate=Düşman istihbaratını ele geçir ve düşmanın istihbaratınızı almasına engel ol.
insurgency_game_description_short_invasion=Hedefleri ele geçir ve düşmanı geri çekilmeye zorla.
insurgency_game_description_short_occupy=Bölgeyi elinde tutan taraf destek kuvvet alma hakkına sahip olur.
insurgency_game_description_short_outpost=Elinden geldiği kadar pozisyonunu koru.
insurgency_game_description_short_push=Hedefleri ele geçir ve düşmanı geri çekilmeye zorla.
insurgency_game_description_short_searchdestroy=Düşman cephaneliğini bul ve yok et.
insurgency_game_description_short_skirmish=Bölgeleri kontrol altına al ve düşman cephaneliğini yok et ya da düşmanı etkisiz hale getir.
insurgency_game_description_short_strike=Bir takım cephaneliği korurken diğer takım cephaneliği yok etmeye çalışacak.
insurgency_game_description_short_survival=Düşman işgaline karşı diren ve hayatta kal.
insurgency_game_description_short_vendetta=Kontrol noktasını koru ya da düşmanı etkisiz hale getir.
insurgency_game_description_skirmish=Bölgeleri ele geçir ve düşman cephaneliğini yok et, ya da bütün düşmanları öldür.Bir bölge ele geçirildiği zaman takımın yeni bir dalga kazanır ve ölüler yeniden doğar.Cephaneliğini koru! Eğer patlatırlarsa bir bölgeyi ele geçirsen dahi yeni bir dalga kazanamazsınız.
insurgency_game_description_strike=Bu Search and Destroy modunda saldıran takım tüm düşman cephaneliklerini yok etmelidir.
insurgency_game_description_survival=İkmal alabilmek ve takımına destek olmak için sığınakları savun.Sığınakta istediğin zaman ikmal yapabilirsin.Diren ve düşman işgalini bastır!
insurgency_game_description_training=Insurgency\'ye hoşgeldin!Acemi birliğin Irak\'a çıktı. Eğitimin birazdan başlayacak, komutanını dinle ve gözünü dört aç!
insurgency_game_description_vendetta=Kazanmak için kontrol noktasını ele geçirin ya da düşmanı etkisiz hale getirin.
