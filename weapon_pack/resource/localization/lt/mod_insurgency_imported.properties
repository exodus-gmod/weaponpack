insurgency_game_description_battle=Ambele echipe au obiectivul de a împinge înainte. O echipă câștigă atunci când toate obiectivele au fost capturate.
insurgency_game_description_conquer=Mișcă-te prin teritoriul controlat de inamic și securizează zona. Distruge depozitele de arme inamice pentru a-i face mai slabi.
insurgency_game_description_elimination=În modul search and destroy, echipa atacantă trebuie să distrugă unul din cele doua depozite de arme ale echipei apărătoare.
insurgency_game_description_firefight=Pentru a câștiga, echipa ta trebuie să captureze toate obiectivele teritoriale sau să elimine echipa inamică. Echipa ta va fi întărită cu forțe noi dacă un obiectiv e capturat.
insurgency_game_description_flashpoint=Capturează obiectivul din mijloc sau distruge depozitul inamic pentru a primi întăriri. Câștigă controlul complet al zonei sau elimină inamicii pentru a câștiga.
insurgency_game_description_hunt=Localizează și elimină toți inamicii și depozitele de arme din zonă.
insurgency_game_description_infiltrate=Obține informația inamică și apără sediul tău de infiltrări. Echipa ta va primi un val de întărire la preluarea informației inamice sau omorârea purtătorului de informație inamic. Asigură victoria prin aducerea informației inamice în sediul tău.
insurgency_game_description_occupy=Controlează obiectivul din mijloc pentru a primi un flux constant de întăriri. Taie întăririle inamice și eliminează prezența lor din zonă pentru a câștiga.
insurgency_game_description_outpost=Protejează avanpostul tău și depozitul de arme din interiorul acestuia. Echipa ta va fi întărită la sfârșitul fiecărui atac inamic.
insurgency_game_description_short_ambush=Protejează VIP-ul de inamici cât timp îl escortezi la punctul de extracție.
insurgency_game_description_short_battle=Ambele echipe trebuie să împingă înainte, capturând toate obiectivele pentru a câștiga.
insurgency_game_description_short_checkpoint=Mișcă-te prin teritoriu inamic, curăță zone și rezistă contra-atacurilor inamice.
insurgency_game_description_short_conquer=Mișcă-te prin teritoriu inamic, distrugând depozite de arme și curățând zona.
insurgency_game_description_short_elimination=Una din echipe trebuie să-și apere depozitele de arme, cât timp cealaltă trebuie să distrugă unul din ele.
insurgency_game_description_short_firefight=Capturează obiective sau elimină echipa inamică, primești întăriri pentru capturarea obiectivelor.
insurgency_game_description_short_flashpoint=Câștigă controlul obiectivelor sau distruge depozitele inamice cât timp le aperi pe ale tale.
insurgency_game_description_short_hunt=Localizează depozitul inamic și elimină toți insurgenții din zonă.
insurgency_game_description_short_infiltrate=Mod de joc în stil capturează steagul, sesizează informația inamică și protejează-ți informația ta.
insurgency_game_description_short_invasion=Capturează puncte de control și împinge-i pe inamici înapoi. Apărătorii trebuie să oprească invazia.
insurgency_game_description_short_occupy=Mod de joc în stil regele dealului, unde controlând zona va seca inamicul de întăriri.
insurgency_game_description_short_outpost=Păstrează poziția pe cât de mult posibil.
insurgency_game_description_short_push=Capturează puncte de control și împinge-i pe inamici înapoi. Apărătorii trebuie să îi oprească pe atacatori din împins.
insurgency_game_description_short_searchdestroy=Localizează și distruge depozitul de arme inamic, eliminând orice apărători întâlniți.
insurgency_game_description_short_skirmish=Controlează toate teritoriile și distruge depozitul inamic, sau elimină toată echipa inamică.
insurgency_game_description_short_strike=Una din echipe trebuie să-și apere depozitele de arme, cât timp cealaltă trebuie să le distrugă.
insurgency_game_description_short_survival=Luptă împotriva ocupației inamice și supraviețuiește pe cât de mult posibil în acest mod cooperativ provocător.
insurgency_game_description_short_vendetta=Securizează punctele de control sau elimină toți inamicii din zonă.
insurgency_game_description_strike=În modul search and destroy, echipa atacantă trebuie să distrugă toate depozitele de arme ale echipei apărătoare.
insurgency_game_description_vendetta=Captuează punctul de control sau elimină echipa inamică pentru a câștiga.
