insurgency_game_description_ambush=A equipe de escolta deve proteger o VIP e leva-lo até o ponto de extração.A equipe de emboscada deve localizar e eliminar o VIP, que pode ser identificado por sua roupa distinta.
insurgency_game_description_battle=Ambas as equipes têm o objetivo de atravessar o mapa. Uma equipe ganha quando todos os objetivos foram capturados.
insurgency_game_description_checkpoint=Neste modo de jogo Cooperativo baseado em missão, você vai montar uma equipe com seus amigos para enfrentar oponentes IA desafiadores.Mova-se pelo território inimigo ocupado um objetivo por vez, limpando cada área e defendendo contra possíveis contra-ataques inimigo.Alguns objetivos são estoques de armas Insurgentes que devem ser destruídas, então tenha certeza que pelo menos alguém em seu esquadrão tenha explosivos!
insurgency_game_description_conquer=Mova-se através do território inimigo e assegure a área. Destrua o suprimento inimigo para enfraquecê-los.
insurgency_game_description_elimination=Neste modo de busca e destruição do jogo, a equipe atacante deve destruir um dos dois esconderijos de armas da equipe defensora.
insurgency_game_description_firefight=Para ganhar, sua equipe deve capturar todos os objetivos territoriais ou eliminar a equipe inimiga. Sua equipe será reforçada se um objetivo for capturado.
insurgency_game_description_flashpoint=Capture o objetivo central para receber reforços. Tome o controle da área ou elimine a equipe inimiga para ganhar.
insurgency_game_description_hunt=Localize e elimine todos os inimigos e suprimentos na área.
insurgency_game_description_infiltrate=Obtenha informações do inimigo e mantenha sua própria base segura de infiltração. Sua equipe receberá uma onda de reforço ao tomar as informações do inimigo ou matar um portador de informações inimigas. Proteja a informação do inimigo trazendo-a para sua base para alcançar a vitória.
insurgency_game_description_invasion=Os invasores devem capturar um objetivo por vez, empurrando os oponente para traz assim que sua equipe avança.Os defensores devem impedir o avanço da equipe oponente.Os atacantes começam com menos ondas de reforços do que os defensores, porem a cada objetivo capturado eles ganham ondas e tempo adicionais.
insurgency_game_description_occupy=Controle o objetivo central para receber um fluxo constante de reforços. Acabe com os reforços inimigos e elimine a sua presença na área para ganhar.
insurgency_game_description_outpost=Proteja seu posto avançado e o suprimento. Seu time será reforçado ao final de cada ataque..
insurgency_game_description_push=Nesse modo de jogo clássico do mod, os atacantes devem capturar um objetivo por vez, empurrando os oponente para traz assim que sua equipe avança.Os defensores devem impedir o avanço da equipe oponente.Os atacantes começam com menos ondas de reforços e pouco tempo, porem a cada objetivo capturado eles ganham 5 ondas e uma extensão de 5 minutos.
insurgency_game_description_searchdestroy=Como atacantes, vocês devem destruir os esconderijos de armas dos inimigos. Quartel General fornece 3 possíveis locais dos esconderijos de armas, então o time atacante deve procurar e descobrir onde os dois esconderijos estão localizados.Como time defensor, vocês devem previnir o time inimigo de destruir todos os seus esconderijos de armas.Jogadores somente renascem quando um dos esconderijos for destruído, e matando todo o time inimigo é um caminho certo para a vitória.
insurgency_game_description_short_ambush=Proteja o VIP das emboscadas inimigas enquanto o escolta para o ponto de extração.
insurgency_game_description_short_battle=Ambas as equipes devem atravessar o mapa, capture todos os objetivos para alcançar a vitória.
insurgency_game_description_short_checkpoint=Mova-se através do território inimigo, limpe áreas e aguente os contra-ataques inimigos.
insurgency_game_description_short_conquer=Mova-se através do território inimigo, destruindo suprimentos de armas e limpando a área.
insurgency_game_description_short_elimination=Uma equipe deve defender o seu suprimento enquanto a outra deve atacá-lo e destruí-lo.
insurgency_game_description_short_firefight=Capture objetivos ou elimine a equipe inimiga, receba reforços ao capturar objetivos.
insurgency_game_description_short_flashpoint=Controle objetivos e destrua os suprimentos inimigos enquanto defende o seu próprio.
insurgency_game_description_short_hunt=Localize o suprimento inimigo e elimine todos os insurgentes na área.
insurgency_game_description_short_infiltrate=Estilo capturar a bandeira, pegue a informação inimiga enquanto protege a sua.
insurgency_game_description_short_invasion=Capture os pontos de controle e afaste os inimigos. Defensores devem parar a invasão.
insurgency_game_description_short_occupy=Estilo rei da montanha, onde controlar a área irá acabar com os reforços inimigos.
insurgency_game_description_short_outpost=Proteja sua posição pelo maior tempo possível.
insurgency_game_description_short_push=Capture os pontos de controle e afaste os inimigos. Defensores devem parar o ataque.
insurgency_game_description_short_searchdestroy=Localize e destrua o suprimento inimigo enquanto elimina os defensores.
insurgency_game_description_short_skirmish=Controle todo o territórios e destrua o suprimento inimigo, ou elimine toda a equipe inimiga.
insurgency_game_description_short_strike=Uma equipe deve defender seu suprimento enquanto a outra deve destruí-lo..
insurgency_game_description_short_survival=Lute contra a ocupação inimiga e sobreviva por tanto tempo quanto possível neste modo de cooperação desafiador.
insurgency_game_description_short_vendetta=Proteja o ponto de controle ou elimine todos os inimigos na área,
insurgency_game_description_skirmish=Controle todos os territórios e destrua o esconderijo inimigo, ou simplesmente elimine toda a equipe inimiga.Cada objetivo pego do inimigo irá imediatamente reviver todos os seus aliados mortos assim como recompensa uma onda de reforço adicional.Tenha certeza de proteger seu esconderijo, uma vez destruído seu time não será capaz de ganhar ondas adicionais pela captura.
insurgency_game_description_strike=Neste modo de busca e destruição do jogo, a equipe atacante deve destruir todos os suprimentos de armas da equipe defensora.
insurgency_game_description_survival=Assegure as casas seguras para ganhar suprimentos e reforçar seu time.Você pode reabastecer em qualquer casa segura a qualquer momento.Sobreviva e lute contra a ocupação oponente!
insurgency_game_description_training=Bem vindo a Insurgency.Nós estamos te mandando para um galpão remoto no Iraque para um treinamento avançado. Certifique-se de seguir a liderança do seu instrutor e você ficara bem!
insurgency_game_description_vendetta=Capture o ponto de controle ou elimine a equipe inimiga para ganhar.
