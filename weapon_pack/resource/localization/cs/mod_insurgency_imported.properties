insurgency_game_description_ambush=Eskorta musí bránit svou VIP a dopravit ji do cílové lokace.Útočníci musí zlikvidovat VIP, které lze poznat podle odlišného oděvu.
insurgency_game_description_battle=Oba týmy na mapě získaly zabratelné body. Tým vyhraje po zabrání všech bodů.
insurgency_game_description_checkpoint=V tomhle kooperativním režimu musíte spolupracovat se svým týmem proti botům.Postupujte přes nepřáteli okupované území na jednu oblast za druhou, zajistěte ji a braňte před možnými protiútoky nepřátel.Některé z oblastí mohou skrývat nepřátelská skladiště, která musíte zničit, takže se ujistěte, že má alespoň jeden člen vašeho týmu výbušniny!
insurgency_game_description_conquer=Postupuj skrz nepřáteli obléhané území a zajisti oblast. Zlikviduj nepřátelské zásoby zbraní pro jejich oslabení.
insurgency_game_description_elimination=V tomto herním režimu \"Search and Destroy\" musí útočící tým zničit jeden ze dvou skladů zbraní bránícího týmu.
insurgency_game_description_firefight=Aby jste vyhráli, váš tým musí obsadit všechny teritoriální body nebo eliminovat celý nepřátelský tým. Váš tým obdrží posily, pokud bude obsazen bod.
insurgency_game_description_flashpoint=Zaber středový bod nebo znič nepřátelskou bednu pro získání posil. Získej kontrolu nad oblastí nebo eliminuj nepřátelský tým, abys vyhrál.
insurgency_game_description_hunt=Najdi a zlikviduj všechny nepřátele a bedny.
insurgency_game_description_infiltrate=Obstarej nepřátelské informace a braň svou základnu před infiltrací. Tvůj tým získá posilu po získání nepřátelských informací nebo zabití nepřátelského dopravce informací. Zvítězíš po dopravení nepřátelských informací do své základny.
insurgency_game_description_invasion=Útočníci musí zabrat bod bráněný nepřítelem a potlačit ho.Obránci musí zabránit postupu útočníků.Útočnící začínají s menším počtem vln, než obránci, ale každý zabraný bod jim dodá vlny i čas.
insurgency_game_description_occupy=Zaber středový bod pro získání stálého zisku posil. Eliminuj nepřátele a vyplítvej jejich posily, abys vyhrál.
insurgency_game_description_outpost=Chraň zvou základnu a bednu uvnitř. Tvůj tým bude oživen po každém nepřátelském útoku.
insurgency_game_description_push=V tomhle klasickém herním módu musí útočníci zabrat tři body bráněné nepřítelem jeden po druhém.Obránci musí zastavit postup útočníků.Útočníci začínají s menším počtem vln a nemají moc času, ale každý zabraný bod jim přidá 5 minut času a 5 vln.
insurgency_game_description_searchdestroy=Jako útočník musíš zničit dvě nepřátelské zásoby zbraní. Budou ti zobrazeny tři lokace, takže musíš zjistit, na kterých dvou se nalézají zásoby.Jako obránce musíš zabránit zničení zásob.Hráči se respawnou po zničení jedné ze zásob. Vítězství se dá docílit i eliminací nepřátel.
insurgency_game_description_short_ambush=Braň VIP před nepřáteli při přemisťování do cílového bodu.
insurgency_game_description_short_battle=Oba týmy musejí přejít přes mapu, zabrat všechny body a tím zvítězit.
insurgency_game_description_short_checkpoint=Projdi přes nepřátelské teritorium, vyčisti oblasti a braň je před nepřátelskými protiútoky.
insurgency_game_description_short_conquer=Projdi přes nepřátelské teritorium, znič jejich skladiště a vyčisti oblast.
insurgency_game_description_short_elimination=Jeden tým se snaží bránit své zásoby zbraní, zatímco druhý se snaží jednu z nich zničit.
insurgency_game_description_short_firefight=Zaber body nebo eliminuj nepřátelský tým. Posily získáš zabráním bodu.
insurgency_game_description_short_flashpoint=Převezměte kontrolu nad body a zničte nepřátelská skladiště, zatímco budete bránit svá vlastní.
insurgency_game_description_short_hunt=Lokalizuj nepřátelské skladiště a eliminuj všechny rebely v oblasti.
insurgency_game_description_short_infiltrate=Herní mod v podobě krádeže vlajek, seberte nepřátelské informace a braňte ty vlastní.
insurgency_game_description_short_invasion=Zaber kontrolní body a potlač nepřítele. Obránci musejí zastavit invazi nepřátel.
insurgency_game_description_short_occupy=Herní mód ve stylu \"King of the hill\", kde zajistíte oblast a tím vyčerpáte nepřátelské posily.
insurgency_game_description_short_outpost=Braň svou základnu co nejdéle.
insurgency_game_description_short_push=Zaber kontrolní body a potlač nepřítele. Obránci musejí zastavit postup útočníků.
insurgency_game_description_short_searchdestroy=Vyhledej a znič nepřátelské zásoby zbraní během eliminace obránců.
insurgency_game_description_short_skirmish=Zajisti všechna území a znič nepřátelskou zásobu zbraní, nebo eliminuj celý nepřátelský tým.
insurgency_game_description_short_strike=Jeden tým se snaží bránit své zásoby zbraní, zatímco druhý se je snaží zlikvidovat.
insurgency_game_description_short_survival=Odrážej nepřátelské útoky, co nejdýl vydržíš, v tomto vyzývajícím kooperativním módu.
insurgency_game_description_short_vendetta=Zajisti kontrolní bod nebo eliminuj všechny nepřátele.
insurgency_game_description_skirmish=Zaberte všechny territoria a zničte nepřátelskou bednu se zásobami, nebo jednoduše zlikvidujte nepřátelský tým.Každá oblast sebraná nepříteli ihned znovuzrodí všechny vaše mrtvé spoluhráče a přidá vám jednu  vlnu znovuzroní.Nezapomeňte bránit vaší bednu se zásobami, jakmile je zničena váš tým již nebude moci získat další znovuzrodící vlny z obsazování.
insurgency_game_description_strike=V tomto herním režimu \"Search and Destroy\" musí útočící tým zničit všechny sklady zbraní bránícího týmu.
insurgency_game_description_survival=Doběhni do aktivní skrýše pro získání zásob a oživení týmu.Můžeš si změnit vybavení nebo doplnit zásoby v jakékoliv skrýši.Přežij a probojuj se přes nepřátele!
insurgency_game_description_training=Vítejte v Insurgency.Posíláme vás na pokročilý výcvik na základnu v Iráku. Posluchejte svého nadřízeného a měli byste výcvik zvládnout!
insurgency_game_description_vendetta=Zaber kontrolní bod nebo eliminuj nepřátelský tým, abys vyhrál.
