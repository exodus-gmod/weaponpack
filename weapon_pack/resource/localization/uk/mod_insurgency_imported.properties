insurgency_game_description_ambush=Команда супроводу має захистити VIP та успішно доставити його до точки евакуації.Команда засідки має знайти на знищити VIP, якого можна впізнати за особливим одягом.
insurgency_game_description_battle=Обидві команди отримують задачу просуватись мапою, захоплюючі цілі. Команда виграє у випадку захоплення всіх цілей.
insurgency_game_description_checkpoint=Цей режим гри складається з місій, ви маєте співпрацювати з друзями задля боротьби із вправними противниками, що контролюються ШІ.Просувайтесь територією, зайнятою ворогом, захоплюючи цілі по одній, зачищаючи зони та відбиваючи можливі контратаки ворога.Деякі з цілей являють собою сховища зброї повстанців, які треба знищити, тому подбайте про те, щоб бодай один з членів підрозділу мав вибухівку!
insurgency_game_description_conquer=Рухайтесь ворожою територією і захопіть зону. Знищуйте сховища зі зброєю, щоб послабити супротивника.
insurgency_game_description_elimination=У режимі Знайти та знищити, атакуюча команда повинна знищити одне зі сховищ із зброєю команди, що тримає оборону.
insurgency_game_description_firefight=Аби перемогти, ваша команда повинна захопити територіальні цілі або ліквідувати команду супротивника. Ваша команда отримає підкріплення, коли ціль буде захоплена.
insurgency_game_description_flashpoint=Захопіть центральну ціль або знищте вороже сховище, аби отримати підкріплення. Щоб перемогти, отримайте контроль над всією зоною або ліквідуйте ворогів..
insurgency_game_description_hunt=Виявте розташування і ліквідуйте всіх ворогів та збройні сховища у зоні.
insurgency_game_description_infiltrate=Отримати розвіддані противника і зберегти свою власну базу в безпеці від проникнення. Ваша команда отримає хвилю підкріплення при взятті розвідданих супротивника, або вбивши носія розвідданих супротивника. Захопіть розвіддані супротивника шляхом їх доставки на свою базу, аби отримати перемогу.
insurgency_game_description_invasion=Команда вторгнення має захоплювати цілі одну за одною, відкидаючи ворога своїм наступом.Захисники мають зупинити просування атакуючих.Атакуючи починають із меншою кількістю хвиль ніж захисники, але кожна захоплена ціль дає додатковий час та хвилі підкріплення.
insurgency_game_description_occupy=Утримуйте центральну ціль, щоб отримувати постійний потік підкріплення. Щоб перемогти, уріжте підкріплення ворога та ліквідуйте його присутність у зоні.
insurgency_game_description_outpost=Захищайте свою заставу та сховище зброї всередині. Ваша команда отримуватиме підкріплення наприкінці кожної атаки ворога.
insurgency_game_description_push=У цьому класичному режимі з моду, атакуючі мають захоплювати одну точку за іншою, відкидаючи ворога.Захисники мають протидіяти наступу атакуючих.Атакуючі починають із значно меншою кількістю хвиль і часу буде обмаль, але кожна захоплена ціль даватиме їм 5 додаткових хвиль та 5 хвилин часу.
insurgency_game_description_searchdestroy=Атакуючі мають знищити два сховища зброї супротивника. Штаб надає 3 можливі місцезнахождення сховищ, тому атакуюча команда має провести пошук за даною інформацією.Команда захисників має не дати супротивникові знищити всі сховища зброї.Гравці відроджуються тільки коли сховище знищено, тому винищення ворожої команди є беззаперечним шляхом до перемоги.
insurgency_game_description_short_ambush=Захистіть VIP-персону від засідки противника, направляючи її до зони евакуації.
insurgency_game_description_short_battle=Обидві команди мають просуватись територією та захопити всі цілі для перемоги.
insurgency_game_description_short_checkpoint=Просувайтесь ворожою територією, зачистіть зони та відбийте контратаки противника.
insurgency_game_description_short_conquer=Просувайтесь ворожою територією, знищіть сховища зброї та зачистіть місцевість.
insurgency_game_description_short_elimination=Одна команда має захищати сховища зі зброєю в той час, як інша команда має знищити одне з них.
insurgency_game_description_short_firefight=Захопіть цілі або знищте команду противника, отримуйте підкріплення за захоплення цілей.
insurgency_game_description_short_flashpoint=Встановіть котроль над цілями та знищте сховища зброї противника, захищаючи свої.
insurgency_game_description_short_hunt=Знайдіть сховище зброї ворога та знищить всіх повстанців у місцевості.
insurgency_game_description_short_infiltrate=Режим гри у стилі \"захоплення прапора\", захопіть розвіддані супротивника, захищаючі свої власні.
insurgency_game_description_short_invasion=Захопіть ключові точки та тисніть сили противника. Захисники мають зупинити вторгнення.
insurgency_game_description_short_occupy=Режим гри у стилі \"царя гори\", де утримування зони буде послабляти підкріплення супротивника.
insurgency_game_description_short_outpost=Утримуйте позицію так довго, як зможете.
insurgency_game_description_short_push=Захопіть ключові точки та тисніть сили противника. Захисники мають зупинити наступ атакуючих.
insurgency_game_description_short_searchdestroy=Знайдіть та знищте сховища зброї противника, ліквідуючи захисників.
insurgency_game_description_short_skirmish=Захопіть контроль над усіма територіями і знищте ворожий сховище або повністю ліквідуйте ворожу команду.
insurgency_game_description_short_strike=Одна команда має захищати сховища зі зброєю в той час, як інша команда має знищити їх.
insurgency_game_description_short_survival=В цьому складному кооперативному режимі ви маєте відбити ворожу окупацію і протриматись якомога довше.
insurgency_game_description_short_vendetta=Захопіть ключову точку або знищте противника у зоні.
insurgency_game_description_skirmish=Захопіть усі території та знищте ворожі сховища, або ж просто перебийте всю ворожу команду.Кожен відібраний у ворога об\'єкт одразу поновлюватиме всіх ваших полеглих товаришів, а також додасть хвилю підкріплення.Подбайте про захист свого сховища, бо якщо його знищать, ваша команда не отримуватиме додаткових хвиль від захоплень.
insurgency_game_description_strike=У режимі Знайти та знищити, атакуюча команда повинна знищити всі сховища зі зброєю тієї команди, що тримає оборону.
insurgency_game_description_survival=Захопіть активну Схованку, щоб отримати припаси та підкріплення. Поповнити боєкомплект у Сховищі можна у будь-який час. Виживіть та відбийте ворожу окупацію!
insurgency_game_description_training=Ласкаво просимо до Insurgency.Ми відправляємо вас у віддалену військову частину в Іраку для проходження особливої військової підготовки. Слідкуйте за вашим інструктором, беріть з нього приклад і ви будете у відмінній формі!
insurgency_game_description_vendetta=Для перемоги треба захопити контрольну точку чи знищити ворожу команду.
