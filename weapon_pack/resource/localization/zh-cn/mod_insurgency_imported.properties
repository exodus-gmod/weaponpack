insurgency_game_description_ambush=护送方必须保护 VIP 并前往撤离点。伏击方必须搜寻并消灭 VIP。VIP 的服装与其他角色不同。
insurgency_game_description_battle=敌我双方都需要在地图上的目标中推进。率先占领所有据点的一方将会获胜。
insurgency_game_description_checkpoint=在这场基于任务目标的合作模式游戏中，团队必须共同对抗具有挑战性的 AI。穿越敌占区，逐个攻占目标并抵抗敌方反攻。一些目标需要摧毁叛军军备，因此请确保小队中有人携带爆炸物。
insurgency_game_description_conquer=穿越敌占区并攻占该区域的据点。摧毁敌军军备以削弱他们的力量。
insurgency_game_description_elimination=在该模式中，进攻方必须搜寻并摧毁敌方两个军备中的一个，而防御方则需要尽全力保护它们。
insurgency_game_description_firefight=通过占领全部据点或歼灭全部敌军获得胜利。每次占领据点时团队都会获得一次增援。
insurgency_game_description_flashpoint=占领中央据点或摧毁敌方军备以获得增援。通过占领全部据点或歼灭全部敌军获得胜利。
insurgency_game_description_hunt=搜寻并清除该区域的全部敌军和军备。
insurgency_game_description_infiltrate=潜入敌方基地获取情报，并阻止敌方渗透。团队将会在获得敌方情报，或击杀了携带我方情报的敌人时获得增援。将敌方情报带回基地即可获胜。
insurgency_game_description_invasion=入侵方必须击退敌军并攻占据点。防御方必须阻止敌军进攻。在游戏开始时，进攻方的增援波次和时间都非常有限，但每攻占一个据点就能获得额外的增援和时间。
insurgency_game_description_occupy=占领并守住中央据点以持续获得增援。通过耗尽敌方增援并歼灭全部敌军获得胜利。
insurgency_game_description_outpost=尽全力保护我方的前哨站和其中的军备。每击退一次敌军攻势，团队就会获得一次增援。
insurgency_game_description_push=经典的推进模式，进攻方必须击退敌军并攻占据点。防御方必须阻止敌军进攻。在游戏开始时，进攻方的增援波次和时间都非常有限，但每攻占一个据点就能获得 5 波增援和 5 分钟时间。
insurgency_game_description_searchdestroy=作为进攻方，团队必须摧毁 2 个敌方军备。指挥所会提供 3 个可能的位置，进攻方必须在其中搜寻军备所处的位置。作为防御方，团队必须阻止敌军摧毁军备。玩家只能在摧毁军备后重生，因此消灭全部敌军也是获胜的途径。
insurgency_game_description_short_ambush=从伏击者手中保护 VIP 并护送至撤离点。
insurgency_game_description_short_battle=双方都必须推进并占领所有据点来获得胜利。
insurgency_game_description_short_checkpoint=穿越敌占区，攻占整个区域并击退敌方反攻。
insurgency_game_description_short_conquer=穿越敌占区，攻占整个区域并摧毁敌方军备。
insurgency_game_description_short_elimination=其中一方必须保护他们的军备，而另一方则要摧毁其中一个。
insurgency_game_description_short_firefight=占领据点或歼灭全部敌军，通过占领据点获得增援。
insurgency_game_description_short_flashpoint=控制全部据点并摧毁敌方军备，同时保护己方军备。
insurgency_game_description_short_hunt=搜寻敌方军备并歼灭全部叛乱分子。
insurgency_game_description_short_infiltrate=夺旗模式，获取敌方情报并保护己方情报。
insurgency_game_description_short_invasion=占领据点并击退敌军。防御方必须阻止这场侵略。
insurgency_game_description_short_occupy=山丘之王模式，通过控制据点来耗尽敌方增援。
insurgency_game_description_short_outpost=尽可能守住己方阵地。
insurgency_game_description_short_push=占领据点并击退敌军。防御方必须阻止进攻方的攻势
insurgency_game_description_short_searchdestroy=搜寻并摧毁敌方军备，同时消灭全部防御者。
insurgency_game_description_short_skirmish=控制所有据点并摧毁敌方军备，或歼灭全部敌军。
insurgency_game_description_short_strike=其中一方必须保护他们的军备，而另一方则要摧毁它。
insurgency_game_description_short_survival=在敌军入侵中尽可能生存下去。
insurgency_game_description_short_vendetta=攻占据点或歼灭全部敌军。
insurgency_game_description_skirmish=攻占所有据点并摧毁敌方军备，或直接消灭所有敌军。每攻占一个据点，团队都会立即重生并获得增援波次。保护己方军备，一旦军备被摧毁，攻占据点时就无法获得更多增援波次。
insurgency_game_description_strike=在该模式中，进攻方必须搜寻并摧毁所有敌方军备，而防御方则需要尽全力保护它们。
insurgency_game_description_survival=占领激活的安全屋以获得补给点数和团队增援。在任何时间都可以在任意安全屋进行补给。生存下去，抵抗敌军的侵略！
insurgency_game_description_training=欢迎来到 Insurgency。我们将会把你送往一个位于伊拉克的场地进行高级训练评估。遵从教官的指示，一定不会有什么问题的！
insurgency_game_description_vendetta=占领据点或歼灭敌军以获得胜利。
