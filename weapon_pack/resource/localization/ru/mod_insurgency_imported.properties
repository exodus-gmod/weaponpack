insurgency_game_description_ambush=Сопровождающая команда должна защитить своего ВИПа и благополучно доставить его к точке эвакуации.Команда засады должна найти и устранить ВИПа, которого можно определить по его особой одежде.
insurgency_game_description_battle=Обеим командам дана цель - наступление по всей карте. Побеждает команда, захватившая все цели.
insurgency_game_description_checkpoint=В этом кооперативном режиме игры на основе миссий вы объединитесь с вашими друзьями в борьбе против сложных врагов с ИИ.Перемещайтесь по удерживаемой врагом местности к одной цели, зачищая каждую территорию и защищаясь от возможных вражеских контратак.Некоторые цели это оружейные запасы повстанцев, которые необходимо уничтожить, поэтому убедитесь, что кто-то в отряде имеет взрывчатку!
insurgency_game_description_conquer=Перемещайтесь по удерживаемой врагом местности и укрепитесь на территории. Уничтожайте оружейные тайники врага для его ослабления.
insurgency_game_description_elimination=В этом игровом режиме нападающая команда должна уничтожить один из двух оружейных тайников команды защиты.
insurgency_game_description_firefight=Для победы ваша команда должна захватить все территориальные цели или устранить вражескую команду. Ваша команда получит подкрепление, если цель будет захвачена.
insurgency_game_description_flashpoint=Захватите центральную точку или уничтожьте оружейные тайники врага для получения подкреплений. Для победы установите контроль над всей территорией или устраните вражескую команду.
insurgency_game_description_hunt=Найдите и уничтожьте всех врагов и оружейные тайники на территории.
insurgency_game_description_infiltrate=Заполучите вражеские разведданные и защищайте вашу базу от проникновения врага. Ваша команда получит волну подкрепления, подобрав данные или убив вражеского переносчика. Для достижения победы завладейте данными врага, принеся их на свою базу.
insurgency_game_description_invasion=Захватчики должны последовательно захватывать точки, оттесняя назад врага во время наступления.Защищающие должны остановить наступление нападающей команды.Нападающие начинают с гораздо меньшим количеством волн в отличие от защищающихся, но при каждом захвате они получают дополнительные волны и время.
insurgency_game_description_occupy=Контролируйте центральную точку для получения постоянного потока подкреплений. Для победы отрежьте вражеские подкрепления и сведите к нулю их присутствие на территории.
insurgency_game_description_outpost=Защищайте свой аванпост и оружейный тайник внутри. Ваша команда будет подкреплена в конце каждого вражеского нападения.
insurgency_game_description_push=В этом классическом режиме игры нападающие должны последовательно захватывать точки, оттесняя назад врага во время наступления.Защищающие должны остановить наступление нападающей команды.Нападающие начинают с гораздо меньшими волнами и небольшим количеством времени, но при каждом захвате они получают дополнительные 5 волн и продление времени на 5 минут.
insurgency_game_description_searchdestroy=Как нападающие, вы должны уничтожить два оружейных тайника врага. Штаб предоставляет информацию о 3 возможных местоположениях тайников, таким образом нападающая команда должна искать и обнаружить, где находятся оба тайника.Как команда защиты, вы должны препятствовать вражеской команде уничтожить все ваши оружейные тайники.Игроки появляются, когда один из тайников уничтожен, поэтому убийство всей вражеской команды это верный путь к победе.
insurgency_game_description_short_ambush=Защитите ВИПа от вражеской засады, сопроводив его до точки эвакуации.
insurgency_game_description_short_battle=Обе команды должны наступать по карте, захватить все цели для достижения победы.
insurgency_game_description_short_checkpoint=Перемещайтесь по вражеской местности, зачистите территории и продержитесь против вражеских контратак.
insurgency_game_description_short_conquer=Перемещайтесь по вражеской местности, уничтожая оружейные тайники и  зачищая территорию.
insurgency_game_description_short_elimination=Одна команда должна защищать свои оружейные тайники, пока другая команда должна уничтожить один из них.
insurgency_game_description_short_firefight=Захватите цели или устраните вражескую команду, получайте подкрепления за захват целей.
insurgency_game_description_short_flashpoint=Заполучите контроль над целями и уничтожьте вражеские тайники, одновременно защищая свои.
insurgency_game_description_short_hunt=Найдите вражеский тайник и устраните всех повстанцев на территории.
insurgency_game_description_short_infiltrate=Игровой режим в стиле захвата флага, завладейте вражескими разведданными, одновременно защищая свои.
insurgency_game_description_short_invasion=Захватите контрольные точки и отбросьте врагов. Защищающие должны остановить вторжение.
insurgency_game_description_short_occupy=Режим в стиле царя горы, где контролирование территории будет истощать вражеские подкрепления.
insurgency_game_description_short_outpost=Удерживайте ваши позиции как можно дольше
insurgency_game_description_short_push=Захватите контрольные точки и отбросьте врагов. Защищающие должны остановить наступление нападающих.
insurgency_game_description_short_searchdestroy=Найдите и уничтожьте оружейные тайники врага, устраняя всех защищающих.
insurgency_game_description_short_skirmish=Контролируйте всю местность и уничтожьте вражеский тайник, либо устраните всех во вражеской команде.
insurgency_game_description_short_strike=Одна команда должна защищать свои оружейные тайники, пока другая команда должна их уничтожить.
insurgency_game_description_short_survival=Сражайтесь с вражеской оккупацией и оставайтесь в живых как можно дольше в этом соревновательном кооперативном режиме.
insurgency_game_description_short_vendetta=Укрепитесь на контрольной точке или устраните всех врагов на территории.
insurgency_game_description_skirmish=Контролируйте всю местность и уничтожьте оружейный тайник врага, или просто устраните всех во вражеской команде.Каждая захваченная у врага цель способствует мгновенному появлению всех ваших мертвых союзников, а также наградит вас дополнительной волной подкрепления.Защищайте ваш тайник, если он будет уничтожен, то ваша команда больше не сможет получить дополнительные волны появления при захвате.
insurgency_game_description_strike=В этом игровом режиме нападающая команда должна уничтожить все оружейные тайники команды защиты.
insurgency_game_description_survival=Укрепитесь в действующих убежищах для получения очков снаряжения и подкрепления вашей команды.Вы можете переснарядиться в убежищах в любое время.Оставайтесь в живых и сражайтесь с вражеской оккупацией!
insurgency_game_description_training=Добро Пожаловать в InsurgencyМы посылаем вас в удаленный лагерь в Ираке для повышения квалификации. Следуйте указаниям инструктора, и вы будете в хорошей форме!
insurgency_game_description_vendetta=Для победы захватите контрольную точку или устраните вражескую команду.
