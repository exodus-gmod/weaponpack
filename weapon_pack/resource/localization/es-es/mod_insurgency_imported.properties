insurgency_game_description_ambush=El equipo escolta debe protejer al VIP y llevarlo con exito al punto de extraccion.El equipo atacante debe localizar y eliminar al VIP, quien puede ser identificado por su vestimenta distintiva.
insurgency_game_description_battle=Ambos equipos tienen como objetivo avanzar a través del mapa. Un equipo gana cuando todos los objetivos han sido capturados.
insurgency_game_description_checkpoint=En esta modo de juego basado en misiones, harás equipo con tus amigos contra desafiantes oponentes de la IA.Muévete a través del territorio ocupado por el enemigo un objetivo a la vez, limpiando cada área  y defendiendo contra posibles contraataques enemigos.Algunos de los objetivos son alijos de armas que deben ser destruidos, ¡Así que asegúrate de tener un miembro de tu escuadrón con explosivos!
insurgency_game_description_conquer=Muevete a tráves de el territorio tomado por fuerzas enemigas y asegura la zona. Destruye alijos enemigos para debilitarlos.
insurgency_game_description_elimination=En este modo de juego, el equipo atacante debe destruir uno de los dos alijos de armas del equipo defensor.
insurgency_game_description_firefight=Para ganar, tu equipo debe capturar todos los objetivos territoriales o eliminar al equipo enemigo. Tu equipo recibirá refuerzos si un objetivo es capturado.
insurgency_game_description_flashpoint=Captura el objetivo en el centro o destruye un deposito enemigo para recibir refuerzos. Controla todo el area o elimina al enemigo para ganar.
insurgency_game_description_hunt=Localiza y elimina a todos los enemigos y sus alijos de armas en el área.
insurgency_game_description_infiltrate=Obtén la inteligencia enemiga y mantén tu base segura de infiltraciones. Tu equipo recibirá una oleada de refuerzos al tomar la inteligencia enemiga o al asesinar a un enemigo portando inteligencia robada. Asegura la inteligencia enemiga llevándola a tu base para conseguir la victoria.
insurgency_game_description_invasion=Los invasores deben capturar un punto a la vez obligando al enemigo a retroceder mientras avanzan.Los defensores deben detener el avance del equipo atacante.Los atacantes empiezan con menos oleadas que los defensores, pero cada vez que capturan un objetivo consiguen oleadas y tiempo adicional.
insurgency_game_description_occupy=Controla el objetivo en el centro para recibir un flujo constante de refuerzos. Corta los refuerzos enemigos y mátalos para ganar.
insurgency_game_description_outpost=Proteje tu base y el deposito de armas dentro de la misma. Tu recibira refuerzos al final de cada ataque enemigo.
insurgency_game_description_push=En este clásico modo de juego del mod, los atacantes deben capturar un punto a la vez haciendo retroceder al enemigo mientras avanzan.Los defensores deben frenar el avance del equipo atacante.Los atacantes comienzan con muchas menos oleadas de refuerzos y no mucho tiempo, pero cada vez que capturen ganan 5 oleadas adicionales y una extensión de 5 minutos.
insurgency_game_description_searchdestroy=Jugando como atacante, debes destruir los dos alijos enemigos. Inteligencia provee de 3 posibles ubicaciones de alijos, el equipo atacante debe buscar y descubrir la ubicacion de los 2 alijos. Como defensor, debes impedir al equipo enemigo de destruir todos los alijos.Los jugadores solo reapareceran cuando uno de los alijos haya sido destruido, recuerda que matar a todo el equipo enemigo tambien es un camino seguro hacia la victoria.
insurgency_game_description_short_ambush=Protege al VIP de las emboscadas enemigas mientras lo escoltas al punto de extracción
insurgency_game_description_short_battle=Ambos equipos deben avanzar a través del mapa, captura todos los objetivos para conseguir la victoria.
insurgency_game_description_short_checkpoint=Muévete entre territorio enemigo, limpia áreas y mantén la zona contra ataques enemigos
insurgency_game_description_short_conquer=Muévete a través de territorio enemigo, destruyendo alijos de armas y limpiando el área.
insurgency_game_description_short_elimination=Un equipo debe defender sus alijos de armas mientras que el otro equipo debe destruir uno de ellos.
insurgency_game_description_short_firefight=Captura objetivos o elimina al equipo enemigo, recibe refuerzos al capturar objetivos.
insurgency_game_description_short_flashpoint=Toma control de los objetivos y destruye los alijos enemigos mientras defiendes los tuyos.
insurgency_game_description_short_hunt=Localiza los alijos enemigos y elimina a todos los insurgentes en el área.
insurgency_game_description_short_infiltrate=Estilo de Juego parecido a Captura la Bandera, apodérate de la inteligencia enemiga mientras proteges la de tu equipo.
insurgency_game_description_short_invasion=Captura los puntos de control y haz retroceder a los enemigos. Los defensores deben detener la invasión. 
insurgency_game_description_short_occupy=Estilo de juego parecido a El Rey de la Colina, donde controlar el área consumirá los refuerzos enemigos.
insurgency_game_description_short_outpost=Protege tu posición tanto tiempo como te sea posible.
insurgency_game_description_short_push=Captura puntos de control y obliga al enemigo a retroceder. Los defensores deben frenar el avance de los atacantes.
insurgency_game_description_short_searchdestroy=Localiza y destruye todos los alijos de armas enemigos mientras eliminas a sus defensores.
insurgency_game_description_short_skirmish=Controla todos los territorios y destruye el alijo enemigo, o elimina a todo el equipo enemigo.
insurgency_game_description_short_strike=Un equipo debe defender sus alijos de armas y el otro equipo debe destruirlos.
insurgency_game_description_short_survival=Rechaza la ocupación enemiga y sobrevive tanto tiempo como te sea posible en este desafiante modo cooperativo.
insurgency_game_description_short_vendetta=Asegura el punto de control o elimina a todos los enemigos en la zona.
insurgency_game_description_skirmish=Controla todos los territorios y destruye el alijo enemigo, o simplemente elimina al equipo enemigo.Cada objetivo capturado automáticamente revivirá a todos tus compañeros, así como también otorgará una oleada adicional de refuerzos.Asegúrate de proteger tu alijo, ya que una vez destruido tu equipo no conseguirá oleadas adicionales por capturas.
insurgency_game_description_strike=En este modo de juego de buscar y destruir, el equipo atacante debe destruir todo el armamento del equipo defensor.
insurgency_game_description_survival=Asegura los Pisos francos activos para conseguir suministros y reforzar a tu equipo.Puedes reabastecerte en cualquier Piso franco en cualquier momento.¡Sobrevive y elimina la ocupación enemiga!
insurgency_game_description_training=Bienvenido a Insurgency.Estamos enviándote a un complejo remoto en Irak para una evaluacion de entrenamiento avanzado. Asegúrate de seguir a tu instructor guía y de estar en buena forma!
insurgency_game_description_vendetta=Captura el punto de control o elimina al equipo enemigo para ganar.
