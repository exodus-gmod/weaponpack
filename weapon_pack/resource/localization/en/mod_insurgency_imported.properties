insurgency_game_description_ambush=The escorting team must protect their VIP and successfully get him to the extraction point. \n\nThe ambushing team must locate and eliminate the VIP, who can be identified by his distinct clothing.
insurgency_game_description_battle=Both teams are given the objective of pushing through the map. A team wins when all objectives have been captured.
insurgency_game_description_checkpoint=In this mission-based Cooperative game mode, you will team up with your friends to take on challenging AI opponents. \n\nMove through the enemy occupied territory one objective at a time, clearing each area and defending against possible enemy counter-attacks. \n\nSome of the objectives are Insurgent weapon stockpiles which must be destroyed, so make sure at least someone in your squad has explosives!
insurgency_game_description_conquer=Move through enemy held territory and secure the area. Destroy enemy weapon caches to weaken them.
insurgency_game_description_elimination=In this search and destroy game mode, the attacking team must destroy one of the defending team\'s two weapon caches.
insurgency_game_description_firefight=To win, your team must capture all territorial objectives or eliminate the enemy team. Your team will be reinforced if an objective is captured.
insurgency_game_description_flashpoint=Capture the middle objective or destroy an enemy cache to receive reinforcements. Gain control of the entire area or eliminate the enemy to win.
insurgency_game_description_hunt=Locate and eliminate all hostiles and weapon caches in the area.
insurgency_game_description_infiltrate=Obtain the enemy intel and keep your own base secure from infiltration. Your team will get a reinforcement wave upon taking the enemy\'s intel or killing an enemy intel carrier. Secure the enemy\'s intel by bringing it to your base to achieve victory.
insurgency_game_description_invasion=The invaders must capture one point at a time pushing the enemy back as they advance. \n\nThe defenders must stop the attacking team from advancing. \n\nThe attackers start out with fewer waves than the defenders, but each time they capture they gain additional waves and additional time.
insurgency_game_description_occupy=Control the middle objective to receive a constant flow of reinforcements. Cut enemy reinforcements off and eliminate their presence in the area to win.
insurgency_game_description_outpost=Protect your outpost and the weapon cache inside it. Your team will be reinforced at the end of each enemy attack.
insurgency_game_description_push=In this classic game mode from the mod, the attackers must capture one point at a time pushing the enemy back as they advance. \n\nThe defenders must stop the attacking team from advancing. \n\nThe attackers start out with much fewer waves and not a whole lot of time, but each time they capture they gain an additional 5 waves and a 5 minute time extension.
insurgency_game_description_searchdestroy=As attackers, you must destroy the enemy\'s two weapon caches. HQ provides 3 possible weapon cache locations, so the attacking team must search and discover where the two caches are located.\n\nAs the defending team, you must prevent the enemy team from destroying all of your weapon caches. \n\nPlayers only respawn when one of the caches are destroyed, and killing all of the enemy team is a sure path to victory.
insurgency_game_description_short_ambush=Protect the VIP from enemy ambushers while escorting them to extraction point.
insurgency_game_description_short_battle=Both teams must push through the map, capture all objectives to achieve victory.
insurgency_game_description_short_checkpoint=Move through enemy territory, clear areas and hold out against enemy counter-attacks.
insurgency_game_description_short_conquer=Move through enemy territory, destroying weapon caches and clearing the area.
insurgency_game_description_short_elimination=One team must defend their weapon caches while the other team must destroy one of them.
insurgency_game_description_short_firefight=Capture objectives or eliminate the enemy team, receive reinforcements for capturing objectives.
insurgency_game_description_short_flashpoint=Gain control of objectives and destroy the enemy caches while defending your own.
insurgency_game_description_short_hunt=Locate the enemy cache and eliminate all insurgents in the area.
insurgency_game_description_short_infiltrate=Capture the flag style game mode, seize the enemy intel while protecting your own.
insurgency_game_description_short_invasion=Capture control points and push back enemies. Defenders must stop the invasion.
insurgency_game_description_short_occupy=King of the hill style game mode where controlling the area will drain enemy reinforcements.
insurgency_game_description_short_outpost=Hold your ground for as long as possible.
insurgency_game_description_short_push=Capture control points and push back enemies. Defenders must stop the attacking push.
insurgency_game_description_short_searchdestroy=Locate and destroy enemy weapon caches while eliminating any defenders.
insurgency_game_description_short_skirmish=Control all territories and destroy the enemy cache, or eliminate all of the enemy team.
insurgency_game_description_short_strike=One team must defend their weapon caches while the other team must destroy them.
insurgency_game_description_short_survival=Fight off the enemy occupation and survive for as long as possible in this challenging coop mode.
insurgency_game_description_short_vendetta=Secure the control point or eliminate all enemies in the area.
insurgency_game_description_skirmish=Control all territories and destroy the enemy\'s cache, or simply eliminate all of the enemy team. \n\nEach objective taken from the enemy will immediately spawn all your dead teammates as well as reward an additional reinforcement wave. \n\nMake sure to protect your cache, as once it\'s destroyed your team is no longer able to gain additional waves from capturing.
insurgency_game_description_strike=In this search and destroy game mode, the attacking team must destroy all of the defending team\'s weapon caches.
insurgency_game_description_survival=Secure active Safehouses to gain supply and reinforce your team.\n\nYou can resupply at any Safehouse at any time.\n\nSurvive and fight off the enemy occupation!
insurgency_game_description_training=Welcome to the Insurgency. \n\nWe are sending you to a remote compound in Iraq for an advanced training assessment. Make sure you follow your instructor\'s lead and you should be in good shape!
insurgency_game_description_vendetta=Capture the control point or eliminate the enemy team to win.
