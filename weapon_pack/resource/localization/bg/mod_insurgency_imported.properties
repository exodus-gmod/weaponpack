insurgency_game_description_battle=И двата отбора са дадени за цел прокарване на картата. Екип печели, когато всички цели са били заловени.
insurgency_game_description_conquer=Придвижване през враг проведе територия и осигуряване района. Унищожи кешира враг оръжие, за да ги отслаби.
insurgency_game_description_elimination=В този режим на игра за търсене и унищожи, екипът на атакуващ трябва да унищожи един от два оръжейни скривалища на защитата отбора.
insurgency_game_description_firefight=За да спечели, вашият екип трябва да обхване всички териториални цели или премахване на противниковия отбор. Вашият екип ще бъде засилена, ако обективно е заловен.
insurgency_game_description_flashpoint=Уловете средната цел или унищожи една кеш враг, за да получи подкрепления. Поеме контрола на цялата площ или премахване на врага, за да спечели.
insurgency_game_description_hunt=Намерете и премахване на всички вражески и скривалища на оръжие в района.
insurgency_game_description_infiltrate=Получаване на Intel враг и да запази собствената си база защитен от проникване. Вашият екип ще получи армировка вълна след като Intel на врага или убиване носител враг Intel. Secure Intel на врага, като го доведе до своя база за постигане на победа.
insurgency_game_description_occupy=Контролирайте средната цел да получи постоянен поток от подкрепления. Нарежете вражески подкрепления изключване и премахване на присъствието си в района, за да спечели.
insurgency_game_description_outpost=Защитете своя пост и кеша на оръжие вътре в нея. Вашият екип ще бъде засилен в края на всяко вражеско нападение.
insurgency_game_description_short_ambush=Защитете VIP от врага засадата, докато ги ескортира на екстракционните точка.
insurgency_game_description_short_battle=И двата отбора трябва да се прокара картата, обхващат всички цели да се постигне победа.
insurgency_game_description_short_checkpoint=Придвижване през територията на врага, ясни области и издържа срещу врага контра-атаки.
insurgency_game_description_short_conquer=Придвижване през територията на врага, унищожавайки кешира оръжие и изчистване на района.
insurgency_game_description_short_elimination=Един отбор трябва да защитят своите оръжейни кеш, докато другият отбор трябва да унищожи един от тях.
insurgency_game_description_short_firefight=Уловете цели или премахване на противниковия отбор, получи подкрепления за улавяне цели.
insurgency_game_description_short_flashpoint=Поеме контрола на цели и унищожи врага кешовете, докато защитата си самостоятелно.
insurgency_game_description_short_hunt=Намерете кеша на врага и да елиминира всички бунтовници в района.
insurgency_game_description_short_infiltrate=Уловете режим игра на стил флаг, се възползва от Intel враг, докато защитава вашата собствена.
insurgency_game_description_short_invasion=Уловете контролни точки и да отложат врагове. Защитници трябва да спрат нахлуването.
insurgency_game_description_short_occupy=Кралят на режим на игра на хълм стил, където контролиране областта ще излязат вражески подкрепления.
insurgency_game_description_short_outpost=Задръж позицията колкото можеш
insurgency_game_description_short_push=Уловете контролни точки и да отложат врагове. Защитници трябва да спре да атакува тласък.
insurgency_game_description_short_searchdestroy=Намерете и унищожи кешира враг оръжие, докато премахването на всички защитници.
insurgency_game_description_short_skirmish=Контролирайте всички територии и да унищожи кеша на враг, или премахване на всички от екипа на врага.
insurgency_game_description_short_strike=Един отбор трябва да защитят своите оръжейни кеш, докато другият отбор трябва да ги унищожи.
insurgency_game_description_short_survival=Пребори с професията враг и да оцелее толкова дълго, колкото е възможно в този режим предизвикателство кооп.
insurgency_game_description_short_vendetta=Подсигури точката за контрол или премахване на всички врагове в района.
insurgency_game_description_strike=В този режим на игра за търсене и унищожи, екипът на атакуващ трябва да унищожи всички оръжия кешира ответната отбора.
insurgency_game_description_vendetta=Уловете точката за контрол или премахване на екипа враг, за да спечели.
