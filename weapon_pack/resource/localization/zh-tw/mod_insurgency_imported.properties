insurgency_game_description_ambush=護送團隊必須保護他們的 VIP 到撤離地點。\n\n伏擊團隊必須由衣著分辨出 VIP 並將他揪出來幹掉。 
insurgency_game_description_battle=兩隊都擁有必須向前突破穿越地圖的目標，成功拿下所有目標的隊伍即獲得勝利。
insurgency_game_description_checkpoint=在這個任務為主的合作遊戲模式中，你將組隊與夥伴們一同挑戰敵方 AI。\n\n通過敵方鎮守的領地並依序攻佔目標，肅清各區並防守敵方可能出現的反擊勢力。\n\n有些目標是必須銷毀的叛亂份子軍火存放堆，於是請務必確保隊中有人攜帶爆裂物！
insurgency_game_description_conquer=穿越敵陣並攻下整個區域。摧毀軍火存放處以削弱敵軍戰鬥能力。
insurgency_game_description_elimination=在這個搜尋並殲滅的模式中，攻擊方必須摧毀防守方兩處軍火存放中的其中一處。
insurgency_game_description_firefight=地圖上將有三個控制點，隊伍必須奪下全部三個目標或是消滅敵軍全體以獲取勝利。 每當成功奪下一個目標時將得到一次增援。
insurgency_game_description_flashpoint=攻佔中央的控制點或摧毀敵方存放處以獲得增援，控制所整個區域或殲滅敵方獲取勝利。
insurgency_game_description_hunt=尋找並消滅區域內所有敵方人員與軍火存放處。
insurgency_game_description_infiltrate=奪取敵軍情報並保衛基地以防滲透，每當成功奪取敵方情報或殺死敵方情報攜帶者時將獲得一次增援，將敵方情報奪回基地以獲取勝利。
insurgency_game_description_invasion=侵略隊伍必須一次一次控制敵方的控制點逼退敵軍陣線。\n \n防守方則必須阻止入侵者的推進。\n\n攻擊者剛開始不會有太多的增援與時間，不過每當他們成功奪取一個控制點他們將獲得更多的增援與延長時間。
insurgency_game_description_occupy=控制中央目標地點以獲取永不斷絕的增援，切斷敵方增援或殲滅區域內敵軍以獲取勝利。
insurgency_game_description_outpost=保護我方前哨站與其中之軍火存放處，每當敵方攻擊結束時我軍將獲得增援。
insurgency_game_description_push=在此源自原始模組的經典遊戲模式中，攻方必須一次一次控制敵方控制點逼退敵軍陣線。 \n\n防守方則必須阻止攻擊方的推進。 \n\n攻擊者剛開始不會有太多的增援與時間，不過每當他們成功奪取一個控制點他們將獲得 5 波增援與 5 分鐘的延長時間。
insurgency_game_description_searchdestroy=身為攻擊方，你們必須摧毀敵方兩個軍火存放處。 總部會提供 3 個存放處可能的所在，於是攻擊方必須搜出兩個存放處的確切位置。\n\n身為防守方，你們必須阻止敵方摧毀你們所有的軍火存放處。 \n\n玩家只會在一個存放箱被摧毀時重生，將敵軍全數殺光便能得到勝利。
insurgency_game_description_short_ambush=在敵方突襲隊的攻擊下保護 VIP 並將其帶往撤離處。
insurgency_game_description_short_battle=兩隊必須推進整張地圖，控制所有目標獲取勝利。
insurgency_game_description_short_checkpoint=穿越敵陣、肅清各區域並抵禦敵方可能出現的反擊勢力。
insurgency_game_description_short_conquer=穿越敵陣、摧毀軍火存放處並肅清整個區域。
insurgency_game_description_short_elimination=其中一隊必須保護他們的軍火存放處而另一隊必須摧毀其中一個。
insurgency_game_description_short_firefight=攻佔所有目標或殲滅敵軍，每當奪下一個目標時進行增援。
insurgency_game_description_short_flashpoint=獲得區域的控制權並摧毀敵方軍火存放處並且保護自己的。
insurgency_game_description_short_hunt=尋找並消滅區域內所有敵方戰鬥人員與軍火存放處。
insurgency_game_description_short_infiltrate=搶奪旗幟類型遊戲模式中，玩家必須竊取敵方情報同時保護己方情報。
insurgency_game_description_short_invasion=攻佔控制點並擊退敵人；而防守者必須阻止敵方的侵略。
insurgency_game_description_short_occupy=山丘之王類型遊戲模式要求隊伍必須控制區域榨乾敵方增援。
insurgency_game_description_short_outpost=盡力戍守陣地。
insurgency_game_description_short_push=攻佔控制點並擊退敵人；而防守者必須阻止攻方的推進。
insurgency_game_description_short_searchdestroy=搜索並摧毀敵方軍火存放並消滅敵軍。
insurgency_game_description_short_skirmish=控制所有領地並摧毀敵方軍火存放處，或直接將敵軍全體殲滅。
insurgency_game_description_short_strike=其中一隊保護他們的軍火存放處而另一隊必須想盡辦法摧毀它們。
insurgency_game_description_short_survival=在這具備挑戰性的合作模式中盡力存活並擊退敵方的掌控！
insurgency_game_description_short_vendetta=攻佔控制點或殲滅境內所有敵軍。
insurgency_game_description_skirmish=控制住所有領地並摧毀敵方軍火存放處，或是消滅敵方隊伍。\n\n每完成一次任務目標將重生我軍所有死去的隊員並得到一波增援作為獎勵。\n\n請保護好自己的軍火存放處，一旦它被摧毀了，隊伍將無法再透過佔領領地獲取增援次數。
insurgency_game_description_strike=在這個搜尋並殲滅模式中，攻擊方必須催毀防守方的每一個軍火存放處。
insurgency_game_description_survival=抵達可用的藏身處以獲得補給點數並得到增援。\n\n隨時都可以在任何一處藏身處中拿取補給。\n\n存活並擊退敵方的掌控！
insurgency_game_description_training=歡迎來到《叛亂》。\n\n我們將你送往了伊拉克一處偏僻的倉庫進行一次進階訓練審核。 請好好遵循教官的指示通過訓練達到備戰狀態！
insurgency_game_description_vendetta=拿下控制點或殲滅敵方全員以獲取勝利。
