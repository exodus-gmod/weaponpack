insurgency_game_description_battle=Beide teams worden een doelstelling gegeven waarbij je door het level moet zien te komen. Een team wint als alle doelstellingen voltooid worden.
insurgency_game_description_elimination=In deze zoek en vernietig spel modus moet het aanvallende team een van de twee verdedigende teams wapennoodvoorraden vernietigen.
insurgency_game_description_firefight=Om te winnen, zou je team alle eigen doelstellingen moeten veroveren, of het vermoorden van het hele vijandelijke team. Je team zou worden versterkt als een doelstelling word veroverd.
insurgency_game_description_flashpoint=Verover de middelste doelstelling of vernietig een vijandelijke opslag om versterkingen te ontvangen. Krijg controle van een heel gebied of elimineer het vijandelijke team om te winnen.
insurgency_game_description_hunt=Vind en elimineer alle agressieve vijanden, en wapen opslagen in het gebied.
insurgency_game_description_infiltrate=Verkrijg de vijandelijke informatie, en houd je eigen basis veilig van infiltratie. Je team krijgt een versterkings golf bij het krijgen van de vijandelijke informatie, of door het vermoorden van een Informatie houder. Beveilig de vijandelijke informatie door het brengen naar je basis, om te winnen.
insurgency_game_description_occupy=Beveilig de middelste doelstelling om constante versterkingen te ontvangen. Zorg ervoor dat de vijand geen versterkingen meer heeft, en elimineer de overblijvenden in het gebied om te winnen.
insurgency_game_description_outpost=Verdedig jouw post en de wapen opslag erin. Je team zou versterking krijgen aan het einde van een vijandelijke aanval.
insurgency_game_description_short_skirmish=Bezet alle gebieden en vernietig de vijandelijke opslag, of elimineer het hele vijandelijke team.
insurgency_game_description_skirmish=Controleer alle gebieden en vernietig de vijandige kratten, of vermoord iedereen van het andere team.Elk objectief wat van de vijand word genomen brengt gelijk al je dode teammates weer tot leven en geeft je ook als bonus een extra reinforcement wave.Maak er zeker van dat je eigen kratten beschermt, omdat anders je team geen waves meer kan krijgen van het overnemen van objectieven.
insurgency_game_description_strike=In deze zoek en vernietig spel modus moet het aanvallende team alle verdedigende teams wapennoodvoorraden vernietigen
insurgency_game_description_training=Welkom bij Insurgency.Wij sturen jou naar een kamp in Irak vooor een moeilijke training. Zorg ervoor dat je de instructies van je instructeur goed volgt, en je zou in goede staat zijn!
insurgency_game_description_vendetta=Verover het controle punt of elimineer het hele vijandelijke team om te winnen.
